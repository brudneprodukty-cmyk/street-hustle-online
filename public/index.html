<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>2D RPG</title>

<style>
body{
margin:0;
overflow:hidden;
background:#111;
color:white;
font-family:Arial;
}

canvas{
display:block;
image-rendering: pixelated;
}

#ui{
position:fixed;
top:10px;
left:10px;
}

#panel{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#2b2b2b;
color:#ddd;
padding:20px;
border:3px solid #555;
border-radius:8px;
display:none;
min-width:250px;
box-shadow:
0 0 0 2px #111 inset,
0 0 15px rgba(0,0,0,0.8);
font-family:Georgia, serif;
}

#panel * {
  position: relative;
}

.slot {
  width: 60px;
  height: 60px;
  border: 2px solid #444;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  background: #111;
  cursor: pointer;
  transition: 0.2s;
}

.slot:hover {
  transform: scale(1.08);
  border-color: white;
}

.slot.big {
  width: 70px;
  height: 70px;
  font-size: 30px;
}
</style>
</head>
<body>

<canvas id="game"></canvas>
<div id="ui"></div>
<div id="panel"></div>

<!-- 🔥 SOCKET -->
<script src="/socket.io/socket.io.js"></script>

<!-- 🔥 YOUR GAME FILES -->
<script src="gameState.js"></script>
<script src="core.js"></script>
<script src="player.js"></script>
<script src="npc.js"></script>
<script src="monsters.js"></script>
<script src="items.js"></script>
<script src="map.js"></script>
<script src="ui.js"></script>
<script src="main.js"></script>

</body>
</html>
