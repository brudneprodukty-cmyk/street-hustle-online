<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MISKEENS</title>

<style>
body{
margin:0;
overflow:hidden;
background:#000;
font-family:Arial;
color:white;
}

/* ===== CANVAS ===== */
canvas{
display:none;
image-rendering: pixelated;
outline:none;
}

/* ===== HOME SCREEN ===== */
#home{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
background:#000;
z-index:10;
}

/* ===== LOGO ===== */
#logo{
width:350px;
opacity:0;
transform:translateY(20px);
transition:all 1s ease;
filter: drop-shadow(0 0 15px rgba(150,0,255,0.7));
}

/* ===== MENU ===== */
.menu{
margin-top:30px;
display:flex;
flex-direction:column;
gap:15px;
opacity:0;
transition:1s;
}

/* ===== BUTTONS ===== */
.btn{
font-size:18px;
letter-spacing:2px;
cursor:pointer;
position:relative;
display:inline-block;
color:white;
transition:0.3s;
}

/* underline */
.btn::after{
content:"";
position:absolute;
left:0;
bottom:-5px;
width:0%;
height:2px;
background:white;
transition:0.3s;
}

.btn:hover{
color:#aaa;
}

.btn:hover::after{
width:100%;
box-shadow:0 0 10px white;
}
</style>
</head>
<body>

<!-- ===== HOME ===== -->
<div id="home">

  <img id="logo" src="images/logo.png">

  <div class="menu" id="menu">
    <div class="btn" onclick="enterGame()">ENTER GAME</div>
    <div class="btn">LOGIN</div>
    <div class="btn">REGISTER</div>
  </div>

</div>

<!-- ===== GAME ===== -->
<canvas id="game" tabindex="1"></canvas>
<div id="ui"></div>
<div id="panel"></div>

<!-- SOCKET -->
<script src="/socket.io/socket.io.js"></script>

<!-- GAME FILES -->
<script src="gameState.js"></script>
<script src="core.js"></script>
<script src="player.js"></script>
<script src="npc.js"></script>
<script src="monsters.js"></script>
<script src="items.js"></script>
<script src="map.js"></script>
<script src="ui.js"></script>
<script src="main.js"></script>

<script>

/* ===== INTRO ANIMATION ===== */

setTimeout(()=>{
  document.getElementById("logo").style.opacity = 1;
  document.getElementById("logo").style.transform = "translateY(0)";
},1500);

setTimeout(()=>{
  document.getElementById("menu").style.opacity = 1;
},2500);


/* ===== ENTER GAME ===== */

function enterGame(){

  document.getElementById("home").style.display = "none";

  const canvas = document.getElementById("game");
  canvas.style.display = "block";

  // ✅ THIS FIXES YOUR KEYS
  setTimeout(() => {
    window.focus();
    document.body.focus();
  }, 50);
}


/* 🔥 ALWAYS KEEP FOCUS ON GAME */
document.body.addEventListener("click", () => {
  const canvas = document.getElementById("game");
  if(canvas.style.display === "block"){
    canvas.focus();
    window.focus();
  }
});



</script>

</body>
</html>
