<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Your Game</title>

<style>
body{
  margin:0;
  background:#0b0b0b;
  color:white;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
}

/* CENTER BOX */
.container{
  text-align:center;
}

/* LOGO */
.logo{
  font-size:48px;
  margin-bottom:40px;
  letter-spacing:4px;
}

/* START BUTTON */
button{
  padding:15px 40px;
  font-size:18px;
  cursor:pointer;
  border:none;
  background:white;
  color:black;
}

/* LOADING SCREEN */
#loadingScreen{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#000;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

/* LOADING BAR */
.bar{
  width:400px;
  height:20px;
  background:#222;
  margin-top:20px;
  position:relative;
}

.progress{
  height:100%;
  width:0%;
  background:#00ffff;
}

/* RUNNING GUY */
.runner{
  position:absolute;
  top:-30px;
  left:0;
  font-size:24px;
}

/* WATER DROP */
.drop{
  position:absolute;
  top:-50px;
  font-size:20px;
  opacity:0;
}
</style>
</head>

<body>

<div class="container" id="menu">
  <div class="logo">YOUR GAME</div>
  <button onclick="startGame()">START</button>
</div>

<div id="loadingScreen">
  <div>Loading... <span id="percent">0%</span></div>

  <div class="bar">
    <div class="progress" id="progress"></div>
    <div class="runner" id="runner">🏃‍♂️</div>
    <div class="drop" id="drop">💧</div>
  </div>
</div>

<script>
function startGame(){

  document.getElementById("menu").style.display = "none";
  document.getElementById("loadingScreen").style.display = "flex";

  let progress = 0;

  let bar = document.getElementById("progress");
  let percent = document.getElementById("percent");
  let runner = document.getElementById("runner");
  let drop = document.getElementById("drop");

  let interval = setInterval(()=>{

    progress++;

    bar.style.width = progress + "%";
    percent.innerText = progress + "%";

    /* RUNNER MOVES */
    runner.style.left = progress + "%";

    /* WATER DROP EFFECT */
    if(progress % 10 === 0){
      drop.style.left = progress + "%";
      drop.style.opacity = 1;
      drop.style.top = "-50px";

      setTimeout(()=>{
        drop.style.top = "0px";
      },10);

      setTimeout(()=>{
        drop.style.opacity = 0;
      },300);
    }

    if(progress >= 100){
      clearInterval(interval);

      setTimeout(()=>{
        window.location.href = "game.html";
      },500);
    }

  }, 30); // speed of loading

}
</script>

</body>
</html>
