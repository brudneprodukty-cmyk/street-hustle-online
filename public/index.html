<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MISKEENS</title>

<style>
body{
margin:0;
overflow:hidden;
background:#000;
font-family:Arial;
color:white;
}

/* ===== CANVAS ===== */
canvas{
display:none;
image-rendering: pixelated;
}

/* ===== HOME SCREEN ===== */
#home{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
background:#000;
z-index:10;
}

/* ===== LOGO IMAGE ===== */
#logo{
width:300px; /* adjust size here */
opacity:0;
transform:translateY(20px);
transition:all 1s ease;
}

/* ===== MENU ===== */
.menu{
margin-top:30px;
display:flex;
flex-direction:column;
gap:15px;
opacity:0;
transition:1s;
}

/* ===== CLEAN BUTTONS ===== */
.btn{
font-size:18px;
letter-spacing:2px;
cursor:pointer;
position:relative;
display:inline-block;
color:white;
transition:0.3s;
}

/* underline effect */
.btn::after{
content:"";
position:absolute;
left:0;
bottom:-5px;
width:0%;
height:2px;
background:white;
transition:0.3s;
}

/* hover */
.btn:hover{
color:#aaa;
}

.btn:hover::after{
width:100%;
box-shadow:0 0 10px white;
}

/* ===== FADE OUT ===== */
.fadeOut{
opacity:0 !important;
pointer-events:none;
transition:0.8s;
}
</style>
</head>
<body>

<!-- ===== HOME SCREEN ===== -->
<div id="home">

  <!-- 🔥 YOUR LOGO HERE -->
  <img id="logo" src="logo2.png">

  <div class="menu" id="menu">
    <div class="btn" onclick="enterGame()">ENTER GAME</div>
    <div class="btn">LOGIN</div>
    <div class="btn">REGISTER</div>
  </div>

</div>

<!-- ===== GAME ===== -->
<canvas id="game"></canvas>
<div id="ui"></div>
<div id="panel"></div>

<!-- SOCKET -->
<script src="/socket.io/socket.io.js"></script>

<!-- GAME FILES -->
<script src="gameState.js"></script>
<script src="core.js"></script>
<script src="player.js"></script>
<script src="npc.js"></script>
<script src="monsters.js"></script>
<script src="items.js"></script>
<script src="map.js"></script>
<script src="ui.js"></script>
<script src="main.js"></script>

<script>

/* ===== INTRO ANIMATION ===== */

setTimeout(()=>{
  document.getElementById("logo").style.opacity = 1;
  document.getElementById("logo").style.transform = "translateY(0)";
},1500);

setTimeout(()=>{
  document.getElementById("menu").style.opacity = 1;
},2500);


/* ===== ENTER GAME ===== */

function enterGame(){

  let home = document.getElementById("home");

  home.classList.add("fadeOut");

  setTimeout(()=>{
    home.style.display = "none";
    document.querySelector("canvas").style.display = "block";
  },800);
}

</script>

</body>
</html>
